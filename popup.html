<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>GenTab Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <!-- Removed Tailwind CDN and Remote Fonts to comply with CSP -->
</head>

<body class="app-container">

    <!-- Background Gradients -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-container">
                <svg class="icon-logo" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
            </div>
            <div>
                <h1 class="app-title">GenTab</h1>
                <div class="status-container">
                    <span class="status-dot"></span>
                    <span class="status-text" id="status-indicator">ONLINE</span>
                </div>
            </div>
        </div>
        <button id="settings-btn" class="icon-btn">
            <svg class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="main-content" id="chat-container">

        <!-- Welcome / Analysis Section -->
        <div id="welcome-section" class="welcome-section fade-in">
            <div class="hero-icon-wrapper">
                <div class="hero-glow"></div>
                <div class="hero-icon-container">
                    <!-- Animated Ring -->
                    <svg class="ring-animation" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1"
                            stroke-dasharray="10 10" />
                    </svg>
                    <div class="hero-emoji">✨</div>
                </div>
            </div>

            <div class="welcome-text">
                <h2>How can I help?</h2>
                <p>I have access to your open tabs.</p>
            </div>

            <!-- Suggestion Chips -->
            <div class="chips-grid">
                <button class="suggestion-chip" data-input="Visualize my tabs in a dashboard">
                    <span class="chip-icon">📊</span>
                    <span class="chip-text">Visualize Tabs</span>
                </button>
                <button class="suggestion-chip" data-input="Research this topic deep">
                    <span class="chip-icon">🧬</span>
                    <span class="chip-text">Deep Research</span>
                </button>
                <button class="suggestion-chip" data-input="Summarize my work context">
                    <span class="chip-icon">📝</span>
                    <span class="chip-text">Summarize Work</span>
                </button>
                <button class="suggestion-chip" data-input="Create a project plan">
                    <span class="chip-icon">🚀</span>
                    <span class="chip-text">Project Plan</span>
                </button>
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="input-footer">
        <div class="input-wrapper">
            <div class="input-glow"></div>
            <input type="text" id="user-input" placeholder="Ask GenTab..." class="text-input">
            <button id="send-btn" class="send-btn">
                <svg class="icon-xs" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </footer>

    <script src="popup.js"></script>
</body>

</html>
